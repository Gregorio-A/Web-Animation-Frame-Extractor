<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --dust: #e0d4bc;  
      --petal: #d4a373;  
      --bg-color: transparent; 
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .wavy-text {
      display: flex;
      justify-content: center;
      user-select: none;
      font-size: 25vw; 
      font-weight: 900;
    }

   
    .wavy-text span {
      font-family: Helvetica;
      font-weight: 400;
      font-style: normal;
      animation: wave-animation 10s infinite ease-in-out;
      will-change: transform, opacity;
      transform-origin: bottom center;
      color: var(--dust);
    }

    .wavy-text span:nth-child(1) { animation-delay: 0.0s; }
    .wavy-text span:nth-child(2) { animation-delay: 1s; }
    .wavy-text span:nth-child(3) { animation-delay: 2s; }
    .wavy-text span:nth-child(4) { animation-delay: 3s; }
    .wavy-text span:nth-child(5) { animation-delay: 4s; }
    .wavy-text span:nth-child(6) { animation-delay: 5s; }
    .wavy-text span:nth-child(7) { animation-delay: 6s; }
    .wavy-text span:nth-child(8) { animation-delay: 7s; }

    @keyframes wave-animation {
      0%, 100% {
        transform: translateY(0) rotateX(0);
      }
      50% {
        transform: translateY(-10vw) rotateX(45deg);
        color: var(--petal);
        /* Sombras ajustadas */
        text-shadow:
          0 1vw 0 rgb(82, 57, 43),
          0 2vw 0 rgb(68, 48, 36),
          0 3vw 0 rgb(31, 22, 16);
      }
    }
  </style>
</head>
<body>

  <div class="wavy-text">
    <span class="wavy-letter">G</span>
    <span class="wavy-letter">r</span>
    <span class="wavy-letter">e</span>
    <span class="wavy-letter">g</span>
    <span class="wavy-letter">o</span>
    <span class="wavy-letter">r</span>
    <span class="wavy-letter">i</span>
    <span class="wavy-letter">o</span>
  </div>

</body>
</html>
